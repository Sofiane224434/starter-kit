<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync Studio</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --panel: #ffffff;
      --ink: #1f1f1a;
      --line: #d8d8cb;
      --accent: #0f766e;
      --accent-2: #115e59;
      --danger: #b91c1c;
      --soft: #eaf7f5;
      --shadow: 0 16px 38px rgba(24, 24, 20, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 20%, #d8faee 0%, transparent 34%),
        radial-gradient(circle at 92% 10%, #fdf3c7 0%, transparent 30%),
        var(--bg);
      padding: 20px;
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .head {
      padding: 18px 22px;
      background: linear-gradient(130deg, #0f766e, #14b8a6);
      color: #ecfffb;
    }

    .head h1 { margin: 0; font-size: 25px; }
    .head p { margin: 6px 0 0; opacity: 0.92; }

    .content { padding: 18px 22px 22px; display: grid; gap: 14px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field { display: grid; gap: 6px; }
    .field label { font-weight: 700; font-size: 14px; }

    select, input {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffdf8;
      outline: none;
      font-size: 14px;
    }

    select:focus, input:focus { border-color: var(--accent); }

    .bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-main { background: var(--accent); color: #fff; }
    .btn-main:hover { background: var(--accent-2); }
    .btn-soft { background: var(--soft); color: #14504b; }
    .btn-danger { background: #fff1f1; color: var(--danger); }

    #list {
      border: 1px solid var(--line);
      border-radius: 12px;
      max-height: 440px;
      overflow: auto;
      background: #fff;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 9px 11px;
      border-bottom: 1px solid #f1f1e6;
      cursor: pointer;
      font-size: 14px;
    }

    .item:last-child { border-bottom: 0; }
    .item:hover { background: #fafdfc; }

    #status {
      min-height: 20px;
      font-weight: 700;
      color: #4b4b44;
    }

    #status.ok { color: #166534; }
    #status.err { color: #b91c1c; }

    @media (max-width: 850px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Sync Studio</h1>
      <p>Clique des fichiers du projet courant, ils deviennent synchronisés avec la cible.</p>
    </header>

    <section class="content">
      <div class="grid">
        <div class="field">
          <label for="source">Projet source</label>
          <select id="source"></select>
        </div>
        <div class="field">
          <label for="target">Projet cible</label>
          <select id="target"></select>
        </div>
      </div>

      <div class="bar">
        <input id="search" placeholder="Filtrer les fichiers..." />
        <button id="reload" class="btn btn-soft" type="button">Rafraichir</button>
        <button id="checkAll" class="btn btn-soft" type="button">Tout cocher (filtré)</button>
        <button id="save" class="btn btn-main" type="button">Enregistrer</button>
        <button id="close" class="btn btn-danger" type="button">Fermer</button>
      </div>

      <div id="list"></div>
      <div id="status"></div>
    </section>
  </main>

  <script>
    const sourceEl = document.getElementById("source");
    const targetEl = document.getElementById("target");
    const searchEl = document.getElementById("search");
    const listEl = document.getElementById("list");
    const reloadEl = document.getElementById("reload");
    const checkAllEl = document.getElementById("checkAll");
    const saveEl = document.getElementById("save");
    const closeEl = document.getElementById("close");
    const statusEl = document.getElementById("status");

    let projects = [];
    let files = [];
    let selected = new Set();

    function setStatus(msg, type = "") {
      statusEl.textContent = msg || "";
      statusEl.className = type ? type : "";
    }

    function filteredFiles() {
      const q = searchEl.value.trim().toLowerCase();
      return q ? files.filter((f) => f.toLowerCase().includes(q)) : files;
    }

    function renderList() {
      const visible = filteredFiles();
      listEl.innerHTML = "";
      for (const file of visible) {
        const row = document.createElement("label");
        row.className = "item";
        row.innerHTML = `
          <input type="checkbox" ${selected.has(file) ? "checked" : ""} />
          <span>${file}</span>
        `;
        const box = row.querySelector("input");
        box.addEventListener("change", () => {
          if (box.checked) selected.add(file);
          else selected.delete(file);
        });
        listEl.appendChild(row);
      }
      setStatus(`${selected.size} fichier(s) sélectionné(s).`);
    }

    function option(project) {
      const o = document.createElement("option");
      o.value = project.path;
      o.textContent = project.name;
      return o;
    }

    function fillTargets() {
      targetEl.innerHTML = "";
      const source = sourceEl.value;
      projects.filter((p) => p.path !== source).forEach((p) => targetEl.appendChild(option(p)));
    }

    async function loadProjects() {
      setStatus("Chargement projets...");
      const res = await fetch("/api/projects");
      const data = await res.json();
      projects = data.projects || [];

      sourceEl.innerHTML = "";
      projects.forEach((p) => sourceEl.appendChild(option(p)));

      if (data.currentProject && projects.find((p) => p.path === data.currentProject)) {
        sourceEl.value = data.currentProject;
      }

      fillTargets();
      await loadState();
    }

    async function loadState() {
      const sourcePath = sourceEl.value;
      if (!sourcePath) return;

      setStatus("Chargement fichiers...");

      const [stateRes, filesRes] = await Promise.all([
        fetch(`/api/state?sourcePath=${encodeURIComponent(sourcePath)}`),
        fetch(`/api/files?projectPath=${encodeURIComponent(sourcePath)}`),
      ]);

      const state = await stateRes.json();
      const filesData = await filesRes.json();

      files = filesData.files || [];
      selected = new Set(state.selectedFiles || []);

      if (state.targetPath && [...targetEl.options].find((o) => o.value === state.targetPath)) {
        targetEl.value = state.targetPath;
      }

      renderList();
      setStatus("Prêt", "ok");
    }

    sourceEl.addEventListener("change", async () => {
      fillTargets();
      await loadState();
    });

    searchEl.addEventListener("input", renderList);
    reloadEl.addEventListener("click", loadProjects);

    checkAllEl.addEventListener("click", () => {
      filteredFiles().forEach((f) => selected.add(f));
      renderList();
    });

    saveEl.addEventListener("click", async () => {
      const sourcePath = sourceEl.value;
      const targetPath = targetEl.value;
      const chosen = [...selected];

      if (!sourcePath || !targetPath) {
        setStatus("Choisis source et cible", "err");
        return;
      }
      if (!chosen.length) {
        setStatus("Choisis au moins un fichier", "err");
        return;
      }

      setStatus("Enregistrement...");
      const res = await fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sourcePath, targetPath, files: chosen }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        setStatus(data.error || "Erreur", "err");
        return;
      }

      setStatus("Configuration enregistrée", "ok");
    });

    closeEl.addEventListener("click", async () => {
      await fetch("/api/close", { method: "POST" });
      setStatus("Fermeture...", "ok");
      setTimeout(() => window.close(), 120);
    });

    loadProjects().catch((e) => setStatus(e.message || "Erreur", "err"));
  </script>
</body>
</html>
