<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync Config App</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --ink: #1f1f1a;
      --card: #ffffff;
      --line: #d7d7c9;
      --accent: #0f766e;
      --accent-2: #115e59;
      --warn: #9a3412;
      --shadow: 0 18px 40px rgba(26, 26, 22, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 20%, #d1fae5 0%, transparent 35%),
        radial-gradient(circle at 90% 10%, #fef3c7 0%, transparent 38%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(940px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .head {
      padding: 22px 24px;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: #ecfffb;
    }

    .head h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.2px;
    }

    .head p {
      margin: 6px 0 0;
      opacity: 0.9;
    }

    .content {
      padding: 22px 24px 24px;
      display: grid;
      gap: 16px;
    }

    .row {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease;
      background: #fffcf7;
    }

    input:focus {
      border-color: var(--accent);
    }

    .grid-head,
    .grid-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .grid-head {
      margin-top: 6px;
      color: #4a4a3f;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .grid-body {
      display: grid;
      gap: 10px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.12s ease;
    }

    .btn:hover { opacity: 0.94; }
    .btn:active { transform: translateY(1px); }

    .btn-main { background: var(--accent); color: white; }
    .btn-main:hover { background: var(--accent-2); }
    .btn-soft { background: #e7f5f3; color: #0f4f4a; }
    .btn-warn { background: #fff2ec; color: var(--warn); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .status {
      min-height: 22px;
      font-size: 14px;
      font-weight: 700;
      color: #444;
    }

    .status.ok { color: #166534; }
    .status.err { color: #b91c1c; }

    @media (max-width: 720px) {
      .grid-head { display: none; }
      .grid-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section class="app">
    <header class="head">
      <h1>Sync Config App</h1>
      <p>Configure la sync sans toucher au JSON.</p>
    </header>

    <div class="content">
      <div class="row">
        <label for="targetRepo">Repo cible (chemin relatif)</label>
        <input id="targetRepo" placeholder="../mon-repo-contexte" />
      </div>

      <div class="row">
        <label>Fichiers synchronises</label>
        <div class="grid-head">
          <span>Source (ce repo)</span>
          <span>Destination (repo cible)</span>
          <span>Action</span>
        </div>
        <div id="entries" class="grid-body"></div>
        <button id="add" class="btn btn-soft" type="button">Ajouter un fichier</button>
      </div>

      <div class="actions">
        <button id="save" class="btn btn-main" type="button">Enregistrer</button>
        <button id="close" class="btn btn-warn" type="button">Fermer l'app</button>
      </div>

      <div id="status" class="status"></div>
    </div>
  </section>

  <script>
    const entriesEl = document.getElementById("entries");
    const targetRepoEl = document.getElementById("targetRepo");
    const statusEl = document.getElementById("status");
    const addBtn = document.getElementById("add");
    const saveBtn = document.getElementById("save");
    const closeBtn = document.getElementById("close");

    function setStatus(msg, type = "") {
      statusEl.textContent = msg;
      statusEl.className = `status ${type}`.trim();
    }

    function makeRow(entry = { from: "", to: "" }) {
      const row = document.createElement("div");
      row.className = "grid-row";
      row.innerHTML = `
        <input class="from" placeholder="conception/cours-conception-starterkit.md" value="${entry.from || ""}">
        <input class="to" placeholder="cours-conception-starterkit.md" value="${entry.to || ""}">
        <button type="button" class="btn btn-warn delete">Supprimer</button>
      `;

      row.querySelector(".delete").addEventListener("click", () => row.remove());
      return row;
    }

    function collectConfig() {
      const targetRepo = targetRepoEl.value.trim().replace(/[\\/]+$/, "");
      const entries = [...entriesEl.querySelectorAll(".grid-row")]
        .map((row) => ({
          from: row.querySelector(".from").value.trim(),
          to: row.querySelector(".to").value.trim(),
        }))
        .filter((item) => item.from && item.to);

      return { targetRepo, entries };
    }

    async function loadConfig() {
      setStatus("Chargement...");
      const res = await fetch("/api/config");
      const cfg = await res.json();

      targetRepoEl.value = cfg.targetRepo || "";
      entriesEl.innerHTML = "";
      (cfg.entries || []).forEach((entry) => entriesEl.appendChild(makeRow(entry)));
      if (!cfg.entries || cfg.entries.length === 0) entriesEl.appendChild(makeRow());
      setStatus("Pret", "ok");
    }

    addBtn.addEventListener("click", () => {
      entriesEl.appendChild(makeRow());
    });

    saveBtn.addEventListener("click", async () => {
      const cfg = collectConfig();
      if (!cfg.targetRepo) {
        setStatus("Repo cible requis", "err");
        return;
      }
      if (!cfg.entries.length) {
        setStatus("Ajoute au moins un fichier", "err");
        return;
      }

      setStatus("Enregistrement...");
      const res = await fetch("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cfg),
      });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        setStatus(data.error || "Erreur", "err");
        return;
      }

      setStatus("Configuration enregistree", "ok");
    });

    closeBtn.addEventListener("click", async () => {
      await fetch("/api/close", { method: "POST" });
      setStatus("Fermeture...", "ok");
      setTimeout(() => window.close(), 150);
    });

    loadConfig().catch((e) => setStatus(e.message || "Erreur", "err"));
  </script>
</body>
</html>
