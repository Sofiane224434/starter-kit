<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync Center</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --panel: #ffffff;
      --ink: #1e2523;
      --muted: #5b6a65;
      --line: #d9e1dd;
      --accent: #0f766e;
      --accent-2: #115e59;
      --danger: #b91c1c;
      --danger-bg: #fff1f1;
      --soft: #e8f5f3;
      --shadow: 0 14px 34px rgba(18, 31, 28, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, #dff7ef 0%, transparent 38%),
        radial-gradient(circle at 90% 8%, #fef3c7 0%, transparent 30%),
        var(--bg);
      padding: 22px;
    }

    .frame {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .head {
      padding: 20px 24px;
      background: linear-gradient(130deg, #0f766e, #14b8a6);
      color: #ecfffb;
    }

    .head h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.3px;
    }

    .head p {
      margin: 6px 0 0;
      opacity: 0.92;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 560px;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      padding: 16px;
      background: #fbfdfc;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .project {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.08s ease, background 0.15s ease;
      background: white;
    }

    .project:hover { border-color: #9bc9c3; }
    .project.active {
      border-color: var(--accent);
      background: var(--soft);
      transform: translateY(-1px);
    }

    .project strong {
      display: block;
      margin-bottom: 4px;
    }

    .project small {
      color: var(--muted);
      display: block;
      line-height: 1.35;
    }

    .content {
      padding: 18px 20px 20px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fffcf7;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: var(--accent);
    }

    .table-head,
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .table-head {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
    }

    #rows {
      display: grid;
      gap: 10px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.08s ease;
    }

    .btn:hover { opacity: 0.94; }
    .btn:active { transform: translateY(1px); }

    .btn-main { background: var(--accent); color: #fff; }
    .btn-main:hover { background: var(--accent-2); }
    .btn-soft { background: var(--soft); color: #144f49; }
    .btn-danger { background: var(--danger-bg); color: var(--danger); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    #status {
      min-height: 20px;
      font-weight: 700;
      font-size: 14px;
      color: var(--muted);
    }

    #status.ok { color: #166534; }
    #status.err { color: var(--danger); }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    @media (max-width: 650px) {
      .table-head { display: none; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <header class="head">
      <h1>Sync Center</h1>
      <p>Une seule app pour configurer tous tes projets connectés.</p>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <button id="reload" class="btn btn-soft" type="button">Rafraichir les projets</button>
        <div id="projectList"></div>
      </aside>

      <section class="content">
        <div class="field">
          <label>Projet sélectionné</label>
          <input id="projectPath" readonly />
        </div>

        <div class="field">
          <label for="targetRepo">Repo cible (chemin relatif)</label>
          <input id="targetRepo" placeholder="../mon-repo-contexte" />
        </div>

        <div class="field">
          <label>Règles de synchronisation</label>
          <div class="table-head">
            <span>Source (ce repo)</span>
            <span>Destination (repo cible)</span>
            <span>Action</span>
          </div>
          <div id="rows"></div>
          <button id="addRow" class="btn btn-soft" type="button">Ajouter une règle</button>
        </div>

        <div class="actions">
          <button id="save" class="btn btn-main" type="button">Enregistrer</button>
          <button id="close" class="btn btn-danger" type="button">Fermer l'app</button>
        </div>

        <div id="status"></div>
      </section>
    </section>
  </main>

  <script>
    const listEl = document.getElementById("projectList");
    const projectPathEl = document.getElementById("projectPath");
    const targetRepoEl = document.getElementById("targetRepo");
    const rowsEl = document.getElementById("rows");
    const reloadBtn = document.getElementById("reload");
    const addRowBtn = document.getElementById("addRow");
    const saveBtn = document.getElementById("save");
    const closeBtn = document.getElementById("close");
    const statusEl = document.getElementById("status");

    let projects = [];
    let selected = null;

    function setStatus(msg, type = "") {
      statusEl.textContent = msg || "";
      statusEl.className = type ? type : "";
    }

    function createRow(entry = { from: "", to: "" }) {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <input class="from" placeholder="conception/cours-conception-starterkit.md" value="${entry.from || ""}">
        <input class="to" placeholder="cours-conception-starterkit.md" value="${entry.to || ""}">
        <button type="button" class="btn btn-danger delete">Supprimer</button>
      `;
      row.querySelector(".delete").addEventListener("click", () => row.remove());
      return row;
    }

    function renderProjects() {
      listEl.innerHTML = "";
      projects.forEach((p) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = `project${selected && selected.projectPath === p.projectPath ? " active" : ""}`;
        card.innerHTML = `
          <strong>${p.name}</strong>
          <small>${p.relPath}</small>
          <small>${p.entriesCount} règle(s)</small>
        `;
        card.addEventListener("click", () => selectProject(p));
        listEl.appendChild(card);
      });
    }

    function collectConfig() {
      return {
        targetRepo: targetRepoEl.value.trim().replace(/[\\/]+$/, ""),
        entries: [...rowsEl.querySelectorAll(".row")]
          .map((row) => ({
            from: row.querySelector(".from").value.trim(),
            to: row.querySelector(".to").value.trim(),
          }))
          .filter((e) => e.from && e.to),
      };
    }

    async function fetchConfig(projectPath) {
      const res = await fetch(`/api/project-config?projectPath=${encodeURIComponent(projectPath)}`);
      if (!res.ok) throw new Error("Impossible de charger la config");
      return res.json();
    }

    async function selectProject(project) {
      selected = project;
      renderProjects();
      projectPathEl.value = project.projectPath;
      setStatus("Chargement de la config...");

      try {
        const cfg = await fetchConfig(project.projectPath);
        targetRepoEl.value = cfg.targetRepo || "";
        rowsEl.innerHTML = "";
        (cfg.entries || []).forEach((e) => rowsEl.appendChild(createRow(e)));
        if (!cfg.entries || cfg.entries.length === 0) rowsEl.appendChild(createRow());
        setStatus("Prêt", "ok");
      } catch (e) {
        setStatus(e.message || "Erreur", "err");
      }
    }

    async function loadProjects() {
      setStatus("Recherche des projets...");
      const res = await fetch("/api/projects");
      const data = await res.json();
      projects = data.projects || [];

      if (!projects.length) {
        listEl.innerHTML = "<small>Aucun projet sync trouvé.</small>";
        projectPathEl.value = "";
        targetRepoEl.value = "";
        rowsEl.innerHTML = "";
        setStatus("Aucun projet", "err");
        return;
      }

      if (!selected || !projects.find((p) => p.projectPath === selected.projectPath)) {
        await selectProject(projects[0]);
      } else {
        renderProjects();
      }
    }

    reloadBtn.addEventListener("click", loadProjects);
    addRowBtn.addEventListener("click", () => rowsEl.appendChild(createRow()));

    saveBtn.addEventListener("click", async () => {
      if (!selected) {
        setStatus("Choisis un projet", "err");
        return;
      }

      const config = collectConfig();
      if (!config.targetRepo) {
        setStatus("Repo cible requis", "err");
        return;
      }
      if (!config.entries.length) {
        setStatus("Ajoute au moins une règle", "err");
        return;
      }

      setStatus("Enregistrement...");
      const res = await fetch("/api/project-config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ projectPath: selected.projectPath, config }),
      });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        setStatus(data.error || "Erreur", "err");
        return;
      }

      setStatus("Configuration enregistrée", "ok");
      await loadProjects();
    });

    closeBtn.addEventListener("click", async () => {
      await fetch("/api/close", { method: "POST" });
      setStatus("Fermeture...", "ok");
      setTimeout(() => window.close(), 150);
    });

    loadProjects().catch((e) => setStatus(e.message || "Erreur", "err"));
  </script>
</body>
</html>
